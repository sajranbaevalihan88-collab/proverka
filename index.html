<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вопрос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh; /* для современных мобильных */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed; /* фиксируем чтобы не было скролла */
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 95vw;
            width: 90%;
            position: relative;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            line-height: 1.3;
            font-weight: 700;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 30px;
            position: relative;
            min-height: 100px;
            flex-wrap: wrap;
        }

        button {
            padding: 20px 50px;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            min-width: 140px;
            min-height: 60px;
            position: relative;
            outline: none;
        }

        /* Убираем hover на мобильных */
        @media (hover: hover) {
            button:hover {
                transform: translateY(-3px);
            }
        }

        #yesBtn {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
            z-index: 10;
            position: relative;
        }

        #yesBtn:active {
            transform: scale(0.95);
            background: linear-gradient(45deg, #0d7a6e, #2dd46a);
        }

        #noBtn {
            background: linear-gradient(45deg, #eb3349, #f45c43);
            color: white;
            z-index: 20;
            position: relative;
            will-change: transform, left, top; /* оптимизация для мобильных */
        }

        #noBtn.running {
            transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 25px rgba(235, 51, 73, 0.6);
        }

        #noBtn:active {
            transform: scale(0.9);
        }

        .result {
            margin-top: 30px;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            color: #333;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s;
            font-weight: bold;
            line-height: 1.4;
        }

        .result.show {
            opacity: 1;
            transform: translateY(0);
            color: #11998e;
        }

        .emoji {
            font-size: clamp(3rem, 10vw, 4rem);
            margin-bottom: 20px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
            opacity: 0.7;
        }

        /* Адаптация для очень маленьких экранов */
        @media (max-width: 350px) {
            .buttons-wrapper {
                gap: 20px;
            }
            button {
                padding: 18px 35px;
                min-width: 120px;
            }
        }

        /* Для планшетов */
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <span class="emoji">🤔</span>
    <h1>Ты сосал?</h1>
    
    <div class="buttons-wrapper" id="buttonsContainer">
        <button id="yesBtn">Да</button>
        <button id="noBtn">Нет</button>
    </div>
    
    <div class="hint">Попробуй поймать кнопку "Нет" 😉</div>
    <div class="result" id="result"></div>
</div>

<script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const result = document.getElementById('result');
    const container = document.querySelector('.container');
    
    let isRunning = false;
    let lastRunTime = 0;
    const runCooldown = 150; // миллисекунды между побегами
    
    // Начальная позиция относительно wrapper
    function resetNoButton() {
        noBtn.style.position = 'relative';
        noBtn.style.left = 'auto';
        noBtn.style.top = 'auto';
        noBtn.style.transform = 'none';
        noBtn.classList.remove('running');
    }
    
    // Получаем размеры кнопки
    function getNoBtnSize() {
        const rect = noBtn.getBoundingClientRect();
        return { width: rect.width, height: rect.height, halfWidth: rect.width/2, halfHeight: rect.height/2 };
    }
    
    // Проверка границ экрана с учетом safe areas
    function getSafeBounds() {
        const padding = 10; // минимальный отступ от края
        const maxX = window.innerWidth - padding;
        const maxY = window.innerHeight - padding;
        const minX = padding;
        const minY = padding;
        return { minX, minY, maxX, maxY };
    }
    
    // Умное убегание с предсказанием траектории
    function escape(fromX, fromY) {
        const now = Date.now();
        if (now - lastRunTime < runCooldown) return;
        
        const btnSize = getNoBtnSize();
        const bounds = getSafeBounds();
        
        // Текущая позиция центра кнопки
        const currentRect = noBtn.getBoundingClientRect();
        const currentX = currentRect.left + btnSize.halfWidth;
        const currentY = currentRect.top + btnSize.halfHeight;
        
        // Вектор от пальца/курсора к кнопке
        let dirX = currentX - fromX;
        let dirY = currentY - fromY;
        
        // Нормализация
        const distance = Math.sqrt(dirX * dirX + dirY * dirY);
        if (distance > 0) {
            dirX /= distance;
            dirY /= distance;
        } else {
            // Если прямо по центру - убегаем в случайную сторону
            const angle = Math.random() * Math.PI * 2;
            dirX = Math.cos(angle);
            dirY = Math.sin(angle);
        }
        
        // Дистанция побега (150-300px в зависимости от расстояния до "врага")
        const escapeDist = 180 + Math.random() * 120;
        
        // Добавляем случайность направления ±45 градусов
        const randomOffset = (Math.random() - 0.5) * Math.PI / 2;
        const cos = Math.cos(randomOffset);
        const sin = Math.sin(randomOffset);
        
        const newDirX = dirX * cos - dirY * sin;
        const newDirY = dirX * sin + dirY * cos;
        
        // Новые координаты
        let newX = currentX + newDirX * escapeDist;
        let newY = currentY + newDirY * escapeDist;
        
        // Проверка границ - если выходим за пределы, отражаемся
        const maxAttempts = 5;
        let attempts = 0;
        
        while ((newX < bounds.minX + btnSize.halfWidth || 
                newX > bounds.maxX - btnSize.halfWidth ||
                newY < bounds.minY + btnSize.halfHeight || 
                newY > bounds.maxY - btnSize.halfHeight) && attempts < maxAttempts) {
            
            // Если упираемся в край, меняем направление
            if (newX < bounds.minX + btnSize.halfWidth || newX > bounds.maxX - btnSize.halfWidth) {
                newDirX *= -1;
            }
            if (newY < bounds.minY + btnSize.halfHeight || newY > bounds.maxY - btnSize.halfHeight) {
                newDirY *= -1;
            }
            
            newX = currentX + newDirX * escapeDist;
            newY = currentY + newDirY * escapeDist;
            attempts++;
        }
        
        // Финальная корректировка
        newX = Math.max(bounds.minX + btnSize.halfWidth, Math.min(bounds.maxX - btnSize.halfWidth, newX));
        newY = Math.max(bounds.minY + btnSize.halfHeight, Math.min(bounds.maxY - btnSize.halfHeight, newY));
        
        // Применяем трансформацию
        noBtn.style.position = 'fixed';
        noBtn.classList.add('running');
        
        // Используем transform для плавности на мобильных
        noBtn.style.left = (newX - btnSize.halfWidth) + 'px';
        noBtn.style.top = (newY - btnSize.halfHeight) + 'px';
        noBtn.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
        
        lastRunTime = now;
        
        // Вибрация на мобильных (если поддерживается)
        if (navigator.vibrate && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            navigator.vibrate(50);
        }
    }
    
    // Обработчики для мыши (десктоп)
    noBtn.addEventListener('mouseenter', (e) => {
        escape(e.clientX, e.clientY);
    });
    
    noBtn.addEventListener('mousemove', (e) => {
        // На десктопе убегаем и при движении мыши над кнопкой
        const rect = noBtn.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        const dist = Math.sqrt(Math.pow(e.clientX - centerX, 2) + Math.pow(e.clientY - centerY, 2));
        
        if (dist < 80) { // если мышь близко к центру
            escape(e.clientX, e.clientY);
        }
    });
    
    // Обработчики для тач устройств
    let touchId = null;
    
    document.addEventListener('touchstart', (e) => {
        // Проверяем все активные касания
        for (let touch of e.touches) {
            const rect = noBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            // Расстояние от пальца до центра кнопки
            const dist = Math.sqrt(Math.pow(touch.clientX - centerX, 2) + Math.pow(touch.clientY - centerY, 2));
            
            // Если палец ближе 100px - убегаем
            if (dist < 100) {
                escape(touch.clientX, touch.clientY);
                touchId = touch.identifier;
                break;
            }
        }
    }, { passive: true });
    
    document.addEventListener('touchmove', (e) => {
        // Предотвращаем скролл если гонимся за кнопкой
        for (let touch of e.touches) {
            const rect = noBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            const dist = Math.sqrt(Math.pow(touch.clientX - centerX, 2) + Math.pow(touch.clientY - centerY, 2));
            
            if (dist < 120) {
                escape(touch.clientX, touch.clientY);
                // Предотвращаем скролл страницы если кнопка рядом
                if (e.cancelable) e.preventDefault();
                break;
            }
        }
    }, { passive: false });
    
    // Обработка нажатия "Да"
    yesBtn.addEventListener('click', () => {
        result.innerHTML = 'Я так и знал! 😏<br><small>Правда всегда восторжествует!</small>';
        result.classList.add('show');
        
        // Убираем подсказку
        document.querySelector('.hint').style.display = 'none';
        
        // Анимация победы
        yesBtn.style.transform = 'scale(1.1)';
        setTimeout(() => {
            yesBtn.style.transition = 'all 0.5s';
            yesBtn.style.transform = 'scale(0) rotate(360deg)';
            yesBtn.style.opacity = '0';
            
            noBtn.style.transition = 'all 0.5s';
            noBtn.style.transform = 'scale(0)';
            noBtn.style.opacity = '0';
            
            setTimeout(() => {
                yesBtn.style.display = 'none';
                noBtn.style.display = 'none';
            }, 500);
        }, 300);
        
        // Конфетти
        createConfetti();
        
        // Вибрация победы
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    });
    
    // Попытка нажать "Нет" (почти невозможно, но на всякий случай)
    noBtn.addEventListener('click', (e) => {
        e.preventDefault();
        // Если каким-то чудом нажали - убегаем сразу
        escape(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);
    });
    
    // Конфетти функция
    function createConfetti() {
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffd700'];
        const count = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ? 50 : 100; // меньше для мобильных
        
        for (let i = 0; i < count; i++) {
            const confetti = document.createElement('div');
            const size = Math.random() * 8 + 4;
            confetti.style.cssText = `
                position: fixed;
                width: ${size}px;
                height: ${size}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                left: ${Math.random() * 100}vw;
                top: -10px;
                border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                pointer-events: none;
                z-index: 9999;
            `;
            
            document.body.appendChild(confetti);
            
            const duration = Math.random() * 2 + 2;
            const xMove = (Math.random() - 0.5) * 300;
            
            confetti.animate([
                { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${xMove}px, ${window.innerHeight + 20}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                fill: 'forwards'
            }).onfinish = () => confetti.remove();
        }
    }
    
    // Предотвращаем масштабирование двойным тапом на iOS
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
            e.preventDefault();
        }
        lastTouchEnd = now;
    }, false);
    
    // При смене ориентации возвращаем кнопку на место если она застряла
    window.addEventListener('resize', () => {
        const rect = noBtn.getBoundingClientRect();
        if (rect.left > window.innerWidth || rect.top > window.innerHeight || rect.right < 0 || rect.bottom < 0) {
            resetNoButton();
        }
    });
    
    // Инициализация
    resetNoButton();
</script>

</body>
</html>
